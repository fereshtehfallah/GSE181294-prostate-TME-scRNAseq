name: prostate-tme
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.10
  - pip
  - jupyter
  - notebook
  - ipykernel
  # Core scientific stack
  - numpy>=1.23
  - pandas>=1.5
  - scipy>=1.9
  - matplotlib>=3.6
  - seaborn>=0.12
  # Single-cell analysis
  - anndata>=0.9
  - scanpy>=1.9
  - python-igraph>=0.10
  - leidenalg>=0.9
  # Report generation
  - pip:
    - python-docx>=0.8.11
    - Pillow>=9.0
